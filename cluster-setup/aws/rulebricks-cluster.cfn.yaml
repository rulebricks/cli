AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Rulebricks EKS cluster: 3-AZ VPC (private nodes, public load balancers),
  hardened EKS with Pod Identity, core + burst nodegroups, one S3 data bucket,
  one IAM role (<cluster>-rulebricks), and independent off-by-default toggles
  for managed MSK / ElastiCache / RDS / AMP - the chart runs Kafka, Valkey,
  and Postgres in-cluster for whichever you leave disabled. Outputs map 1:1 to
  the Rulebricks CLI wizard fields.

# =============================================================================
# See README.md for the full resource inventory, parameters, deploy, and
# take-down commands. Every resource here is deployment-independent: nothing
# needs a Rulebricks deployment name, so one cluster hosts many deployments.
# The Rulebricks CLI creates the namespace-scoped Pod Identity associations
# (vector / backup / prometheus / hps / hps-worker) at deploy time.
# =============================================================================

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Cluster }
        Parameters:
          - ClusterName
          - KubernetesVersion
          - ClusterEndpointAccess
          - AdminPrincipalArn
          - KmsKeyArn
      - Label: { default: Networking }
        Parameters:
          - VpcCidr
          - SingleNatGateway
          - EnableVpcInterfaceEndpoints
      - Label: { default: "Secrets (External Secrets Operator)" }
        Parameters:
          - EnableExternalSecrets
          - SecretsPrefix
          - SecretsKmsKeyArn
      - Label: { default: "Registry mirror (ECR pull-through cache)" }
        Parameters:
          - EnableRegistryMirror
          - RegistryMirrorUsername
          - RegistryMirrorAccessToken
      - Label: { default: "DNS (external-dns)" }
        Parameters:
          - EnableExternalDns
          - DnsZoneId
      - Label: { default: Object storage }
        Parameters:
          - EnableDataBucketProtection
      - Label: { default: Core node group }
        Parameters:
          - NodeInstanceType
          - NodeDesiredCapacity
          - NodeMinSize
          - NodeMaxSize
          - NodeVolumeSizeGiB
      - Label: { default: Burst node group }
        Parameters:
          - EnableBurstPool
          - BurstInstanceType
          - BurstNodeMaxSize
      - Label: { default: "Managed Kafka (Amazon MSK)" }
        Parameters:
          - EnableManagedKafka
          - KafkaVersion
          - KafkaInstanceType
          - KafkaBrokerNodes
          - KafkaVolumeSizeGiB
      - Label: { default: "Managed Redis (ElastiCache for Valkey)" }
        Parameters:
          - EnableManagedRedis
          - RedisNodeType
          - RedisEngineVersion
          - RedisMultiAz
      - Label: { default: "Managed database (RDS for PostgreSQL)" }
        Parameters:
          - EnableManagedDatabase
          - DbInstanceClass
          - DbEngineVersion
          - DbMasterUsername
          - DbAllocatedStorageGiB
          - DbMaxAllocatedStorageGiB
          - DbMultiAz
          - DbBackupRetentionDays
          - DbDeletionProtection
      - Label: { default: "Metrics (Amazon Managed Prometheus)" }
        Parameters:
          - EnableManagedPrometheus
    ParameterLabels:
      ClusterName: { default: Cluster name (prefixes every resource name) }
      ClusterEndpointAccess: { default: Kubernetes API endpoint exposure }
      AdminPrincipalArn: { default: Extra cluster-admin IAM principal (optional) }
      KmsKeyArn: { default: BYO KMS key for secrets encryption (optional) }

Parameters:
  # ---------------------------------------------------------------------------
  # Cluster
  # ---------------------------------------------------------------------------
  ClusterName:
    Type: String
    Default: rulebricks-cluster
    Description: >-
      Used as the name prefix for every resource in the stack. The Rulebricks
      CLI wizard preselects resources named <cluster>-rulebricks (IAM role) and
      <cluster>-data (S3 bucket), so keep the convention if you rename.
  KubernetesVersion:
    Type: String
    Default: "1.34"
  ClusterEndpointAccess:
    Type: String
    AllowedValues: ["PublicAndPrivate", "PrivateOnly"]
    Default: PublicAndPrivate
    Description: >-
      PublicAndPrivate keeps the Kubernetes API reachable from operator
      workstations (nodes still talk to it privately). PrivateOnly restricts
      the API to the VPC - you will need a bastion/VPN/Cloud9 in the VPC (or a
      peered network) to run kubectl, helm, and the Rulebricks CLI.
  AdminPrincipalArn:
    Type: String
    Default: ""
    Description: >-
      Optional IAM principal ARN (role or user) to grant cluster-admin via an
      EKS access entry, e.g. your platform team's operations role. The identity
      that creates this stack automatically gets cluster-admin (EKS bootstrap
      permissions), so this is for the SECOND operator identity.
  KmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional existing KMS key ARN for EKS secrets envelope encryption. Leave
      empty to have the stack create a dedicated key (alias/<cluster>-eks-secrets)
      with rotation enabled.

  # ---------------------------------------------------------------------------
  # Networking
  # ---------------------------------------------------------------------------
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: >-
      VPC CIDR. Must be /18 or larger: the stack carves six /19 subnets out of
      it (3 private for nodes + data services, 3 public for load balancers).
      Pick a range that does not overlap networks you may peer with.
  SingleNatGateway:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      true = one NAT gateway (cheapest; an AZ outage pauses egress for the
      other two AZs). false = one NAT gateway per AZ (survives an AZ outage;
      3x the NAT hourly cost). Data-plane traffic to S3 bypasses NAT either
      way via the gateway endpoint.
  EnableVpcInterfaceEndpoints:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Add interface VPC endpoints (ECR, EC2, STS, EKS, EKS Auth, ELB, Logs) so
      node/pod control traffic never leaves the VPC. Recommended for
      restricted-egress environments; adds per-endpoint hourly cost.

  # ---------------------------------------------------------------------------
  # Secrets (External Secrets Operator)
  # ---------------------------------------------------------------------------
  EnableExternalSecrets:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      Create the <cluster>-external-secrets Pod Identity role that the External
      Secrets Operator's reader ServiceAccount assumes to sync AWS Secrets
      Manager entries into Kubernetes Secrets. Read-only, scoped to the
      SecretsPrefix below. Unlike Azure Key Vault there is no vault resource to
      create - the name prefix is the organizational unit within Secrets
      Manager. The Rulebricks CLI seeds entries under the prefix and preselects
      this role by name.
  SecretsPrefix:
    Type: String
    Default: ""
    Description: >-
      Secrets Manager name prefix the external-secrets role may read (one JSON
      object per Rulebricks secret lives under it, e.g. <prefix>/app,
      <prefix>/supabase-jwt - see the chart's .secrets.example). Leave empty
      to default to "rulebricks". A trailing slash is added automatically.
  SecretsKmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional customer-managed KMS key ARN that encrypts the Secrets Manager
      entries under SecretsPrefix. Grants the external-secrets role kms:Decrypt
      on it. Leave empty when entries use the AWS-managed key.

  # ---------------------------------------------------------------------------
  # Registry mirror (ECR pull-through cache)
  # ---------------------------------------------------------------------------
  EnableRegistryMirror:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Create an ECR pull-through cache for the private docker.io/rulebricks/*
      images (ACR-mirror parity). First pull populates the cache; later pulls
      stay in-region and survive Docker Hub outages/rate limits. Point the
      chart's global.imageRegistry at the RegistryMirrorUri output. For
      air-gapped push-based mirroring use mirror-to-ecr.sh instead.
  RegistryMirrorUsername:
    Type: String
    Default: rulebricks
    Description: Docker Hub username for the pull-through cache credential.
  RegistryMirrorAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      Docker Hub access token for the pull-through cache credential. For
      Rulebricks images this is "dckr_pat_" + your license key. Required when
      EnableRegistryMirror=true; stored in Secrets Manager under the
      ecr-pullthroughcache/ prefix ECR requires.

  # ---------------------------------------------------------------------------
  # DNS (external-dns)
  # ---------------------------------------------------------------------------
  EnableExternalDns:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Create the <cluster>-external-dns Pod Identity role scoped to one Route53
      hosted zone so the chart's external-dns can manage DNS records
      automatically (Azure dns-role parity). Requires DnsZoneId.
  DnsZoneId:
    Type: String
    Default: ""
    Description: >-
      Route53 hosted zone ID (e.g. Z0123456789ABC) external-dns may write to.
      Required when EnableExternalDns=true.

  # ---------------------------------------------------------------------------
  # Object storage hardening
  # ---------------------------------------------------------------------------
  EnableDataBucketProtection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Production hardening for the data bucket: object versioning with a
      30-day noncurrent-version expiry (accidental-delete recovery, parity
      with the Azure storage soft-delete/versioning posture). Leave false for
      removable test stacks.

  # ---------------------------------------------------------------------------
  # Core node group
  # ---------------------------------------------------------------------------
  NodeInstanceType:
    Type: String
    # m7i (4 GiB/vCPU) over c7i (2 GiB/vCPU): the chart's steady-state request
    # floor is ~10 vCPU / ~23 GiB, so compute-optimized nodes run out of
    # memory first.
    Default: m7i.xlarge
  NodeDesiredCapacity:
    Type: Number
    # 3 nodes (12 vCPU / 48 GiB) fit the chart's ~10 vCPU / ~23 GiB steady-state
    # request floor with headroom, one per AZ.
    Default: 3
  NodeMinSize:
    Type: Number
    Default: 3
  NodeMaxSize:
    Type: Number
    # Burst capacity lives in the dedicated burst nodegroup; 8 core nodes
    # leaves room for the gather plane scaling to 16 HPS pods plus Traefik's
    # HPA. Scale-down-safe: the cluster-autoscaler removes core nodes as
    # HPS sheds replicas.
    Default: 8
  NodeVolumeSizeGiB:
    Type: Number
    Default: 50

  # ---------------------------------------------------------------------------
  # Burst node group
  # ---------------------------------------------------------------------------
  EnableBurstPool:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      Add a dedicated burst nodegroup: large on-demand nodes (scale
      0->BurstNodeMaxSize) labeled and tainted rulebricks.com/pool=burst. The
      Rulebricks chart makes workers tolerate and softly prefer it out of the
      box, keeping the scaled-out fleet off the core nodes.
  BurstInstanceType:
    Type: String
    Default: m7i.4xlarge
    Description: >-
      Instance type for the burst nodegroup. Default 16 vCPU / 64 GiB: 3x4 vCPU
      core floor + 16 = 28 vCPU running steady-state at full burst. Memory
      matters as much as cores - workers request 1 GiB each, so the default
      64-worker KEDA ceiling needs ~64 GiB.
  BurstNodeMaxSize:
    Type: Number
    Default: 4
    Description: >-
      Ceiling for the burst pool - in practice the cluster's payload
      throughput ceiling (each 16-vCPU node adds roughly 30-50k payloads/sec
      of bulk capacity). Deliberately liberal: the cluster-autoscaler only
      provisions nodes for Pending workers and drains them minutes after the
      fleet cools, so unused ceiling costs nothing. 4 nodes fits the chart's
      full 128-worker fleet (128 x 500m CPU requests = 64 vCPU), the point
      where the solution topic's partition count becomes the limit.

  # ---------------------------------------------------------------------------
  # Managed Kafka (Amazon MSK)
  # ---------------------------------------------------------------------------
  EnableManagedKafka:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Provision an Amazon MSK cluster (IAM auth, TLS) instead of running Kafka
      in-cluster. Pair with CLI config: kafka mode "external", preset
      "aws-msk-iam". The chart's provisioning job creates the topics
      (solution x128, solution-response x128, logs x24 partitions) at deploy
      time using the <cluster>-rulebricks role.
  KafkaVersion:
    Type: String
    Default: 3.9.x
    Description: Apache Kafka version (3.9.x is the MSK-recommended version).
  KafkaInstanceType:
    Type: String
    Default: kafka.m7g.large
  KafkaBrokerNodes:
    Type: Number
    Default: 3
    Description: >-
      Broker count; must be a multiple of 3 (one per AZ/subnet). 3 brokers
      supports the chart's replication factor of 3.
  KafkaVolumeSizeGiB:
    Type: Number
    Default: 100

  # ---------------------------------------------------------------------------
  # Managed Redis (ElastiCache for Valkey)
  # ---------------------------------------------------------------------------
  EnableManagedRedis:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Provision an ElastiCache for Valkey replication group (TLS + AUTH token in
      Secrets Manager) instead of running Valkey in-cluster. Pair with CLI
      config: redis mode "external", TLS on. Valkey matches the engine the
      chart runs in-cluster, so behavior is identical.
  RedisNodeType:
    Type: String
    Default: cache.m7g.large
  RedisEngineVersion:
    Type: String
    Default: "8.2"
  RedisMultiAz:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      true = primary + one replica across AZs with automatic failover.
      false = single node (cheaper; cache rebuilds on node failure).

  # ---------------------------------------------------------------------------
  # Managed database (RDS for PostgreSQL)
  # ---------------------------------------------------------------------------
  EnableManagedDatabase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Provision an RDS for PostgreSQL instance instead of running Postgres
      in-cluster. Pair with CLI config: database "self-hosted" + postgres mode
      "external". The instance ships with rds.logical_replication=1 because
      Supabase Realtime requires logical replication (the CLI preflights this).
  DbInstanceClass:
    Type: String
    Default: db.m7g.large
  DbEngineVersion:
    Type: String
    Default: "17"
    Description: >-
      PostgreSQL engine version. Major version only ("17") lets RDS pick the
      current default minor. Must stay on major 17 unless you also change the
      parameter group family (postgres17).
  DbMasterUsername:
    Type: String
    Default: postgres
    Description: >-
      Master username; the Rulebricks bootstrap job connects with this to
      create the Supabase roles and schemas (CLI field bootstrap.masterUsername).
  DbAllocatedStorageGiB:
    Type: Number
    Default: 100
  DbMaxAllocatedStorageGiB:
    Type: Number
    Default: 500
    Description: Storage autoscaling ceiling.
  DbMultiAz:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
  DbBackupRetentionDays:
    Type: Number
    Default: 7
  DbDeletionProtection:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      Blocks accidental instance deletion (including stack deletion). Set false
      before tearing down. The instance also snapshots on delete/replace.

  # ---------------------------------------------------------------------------
  # Metrics (Amazon Managed Prometheus)
  # ---------------------------------------------------------------------------
  EnableManagedPrometheus:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Create an AMP workspace for Prometheus remote write. Leave off to keep
      metrics in-cluster or send them to an existing observability platform.

Conditions:
  BurstPoolEnabled: !Equals [!Ref EnableBurstPool, "true"]
  PrivateOnlyEndpoint: !Equals [!Ref ClusterEndpointAccess, "PrivateOnly"]
  MultiNat: !Equals [!Ref SingleNatGateway, "false"]
  InterfaceEndpointsEnabled: !Equals [!Ref EnableVpcInterfaceEndpoints, "true"]
  CreateKmsKey: !Equals [!Ref KmsKeyArn, ""]
  HasAdminPrincipal: !Not [!Equals [!Ref AdminPrincipalArn, ""]]
  ExternalSecretsEnabled: !Equals [!Ref EnableExternalSecrets, "true"]
  DefaultSecretsPrefix: !Equals [!Ref SecretsPrefix, ""]
  HasSecretsKmsKey:
    !And [
      { Condition: ExternalSecretsEnabled },
      !Not [!Equals [!Ref SecretsKmsKeyArn, ""]],
    ]
  RegistryMirrorEnabled: !Equals [!Ref EnableRegistryMirror, "true"]
  ExternalDnsEnabled: !Equals [!Ref EnableExternalDns, "true"]
  DataBucketProtectionEnabled: !Equals [!Ref EnableDataBucketProtection, "true"]
  ManagedKafkaEnabled: !Equals [!Ref EnableManagedKafka, "true"]
  ManagedRedisEnabled: !Equals [!Ref EnableManagedRedis, "true"]
  RedisMultiAzEnabled:
    !And [
      { Condition: ManagedRedisEnabled },
      !Equals [!Ref RedisMultiAz, "true"],
    ]
  ManagedDatabaseEnabled: !Equals [!Ref EnableManagedDatabase, "true"]
  ManagedPrometheusEnabled: !Equals [!Ref EnableManagedPrometheus, "true"]

Resources:
  # ===========================================================================
  # NETWORK
  # 3 AZs. Private subnets hold nodes and every managed data service; public
  # subnets exist only for internet-facing load balancers (Traefik's Service
  # of type LoadBalancer) and the NAT gateway(s). Subnets are six /19 slices
  # of VpcCidr: private = slices 0-2, public = slices 3-5.
  # ===========================================================================
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-vpc" }
        - { Key: Environment, Value: rulebricks }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-igw" }

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # --- Private subnets (nodes + data services) -------------------------------
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-a" }
        # Lets the in-cluster cloud controller place internal load balancers.
        - { Key: kubernetes.io/role/internal-elb, Value: "1" }

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-b" }
        - { Key: kubernetes.io/role/internal-elb, Value: "1" }

  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-c" }
        - { Key: kubernetes.io/role/internal-elb, Value: "1" }

  # --- Public subnets (load balancers + NAT) ---------------------------------
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-a" }
        # Lets the in-cluster cloud controller place internet-facing LBs.
        - { Key: kubernetes.io/role/elb, Value: "1" }

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-b" }
        - { Key: kubernetes.io/role/elb, Value: "1" }

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 6, 13]]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-c" }
        - { Key: kubernetes.io/role/elb, Value: "1" }

  # --- Public routing ---------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-rt" }

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable }
  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable }
  PublicSubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetC, RouteTableId: !Ref PublicRouteTable }

  # --- NAT egress for private subnets ----------------------------------------
  # NatGatewayA always exists; B and C only when SingleNatGateway=false. Each
  # private subnet gets its own route table so per-AZ NAT is a routing change,
  # not a re-architecture.
  NatEipA:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties: { Domain: vpc }

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-nat-a" }

  NatEipB:
    Type: AWS::EC2::EIP
    Condition: MultiNat
    DependsOn: VpcGatewayAttachment
    Properties: { Domain: vpc }

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Condition: MultiNat
    Properties:
      AllocationId: !GetAtt NatEipB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-nat-b" }

  NatEipC:
    Type: AWS::EC2::EIP
    Condition: MultiNat
    DependsOn: VpcGatewayAttachment
    Properties: { Domain: vpc }

  NatGatewayC:
    Type: AWS::EC2::NatGateway
    Condition: MultiNat
    Properties:
      AllocationId: !GetAtt NatEipC.AllocationId
      SubnetId: !Ref PublicSubnetC
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-nat-c" }

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-rt-a" }
  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-rt-b" }
  PrivateRouteTableC:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-rt-c" }

  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA
  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [MultiNat, !Ref NatGatewayB, !Ref NatGatewayA]
  PrivateDefaultRouteC:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableC
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [MultiNat, !Ref NatGatewayC, !Ref NatGatewayA]

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRouteTableA }
  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTableB }
  PrivateSubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetC, RouteTableId: !Ref PrivateRouteTableC }

  # --- VPC endpoints ----------------------------------------------------------
  # S3 gateway endpoint is free and keeps decision-log/backup/ECR-layer traffic
  # off the NAT path. Interface endpoints are optional hardening.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
        - !Ref PrivateRouteTableC

  InterfaceEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: InterfaceEndpointsEnabled
    Properties:
      GroupDescription: HTTPS to interface VPC endpoints from within the VPC
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-vpce" }

  Ec2InterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ec2"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  EcrApiInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  EcrDkrInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  StsInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.sts"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  EksInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.eks"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  # EKS Pod Identity agent calls the EKS Auth API from every node.
  EksAuthInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.eks-auth"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  ElbInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.elasticloadbalancing"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  LogsInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: InterfaceEndpointsEnabled
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]
      SecurityGroupIds: [!Ref InterfaceEndpointSecurityGroup]

  # ===========================================================================
  # KMS (EKS secrets envelope encryption)
  # ===========================================================================
  KmsKey:
    Type: AWS::KMS::Key
    Condition: CreateKmsKey
    Properties:
      Description: !Sub "EKS secrets envelope encryption for ${ClusterName}"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          # Root account access keeps the key manageable via IAM policies;
          # EKS accesses it through the cluster role's grant.
          - Sid: EnableIamPermissions
            Effect: Allow
            Principal: { AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root" }
            Action: kms:*
            Resource: "*"
      Tags:
        - { Key: Environment, Value: rulebricks }

  KmsKeyAlias:
    Type: AWS::KMS::Alias
    Condition: CreateKmsKey
    Properties:
      AliasName: !Sub "alias/${ClusterName}-eks-secrets"
      TargetKeyId: !Ref KmsKey

  # ===========================================================================
  # CLUSTER + NODE IAM
  # ===========================================================================
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: eks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEKSClusterPolicy"
      Policies:
        # EKS creates a KMS grant with this role to envelope-encrypt secrets;
        # the managed policy above does not include KMS.
        - PolicyName: eks-secrets-kms
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:CreateGrant
                  - kms:DescribeKey
                Resource:
                  - !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]

  # Nodes carry only what the kubelet itself needs. The EBS CSI driver gets a
  # dedicated Pod Identity role below (least privilege), unlike attaching the
  # CSI policy to every node.
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEKSWorkerNodePolicy"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEKS_CNI_Policy"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"

  EbsCsiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-ebs-csi"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy"

  # Cluster-autoscaler role (Pod Identity). EKS nodegroups have no built-in
  # scaling, so the chart deploys cluster-autoscaler on AWS and the CLI's
  # workload-identity step binds its ServiceAccount to this role; without it
  # the burst nodegroup never leaves desired=0. Managed nodegroups auto-tag
  # their ASGs with the k8s.io/cluster-autoscaler discovery tags, which the
  # write-action condition below is scoped to.
  ClusterAutoscalerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-cluster-autoscaler"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: cluster-autoscaler
          # JSON-string form: the cluster-scoped condition key embeds
          # ${ClusterName}, and YAML mapping keys can't hold intrinsics.
          PolicyDocument: !Sub |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "WriteScopedToThisCluster",
                  "Effect": "Allow",
                  "Action": [
                    "autoscaling:SetDesiredCapacity",
                    "autoscaling:TerminateInstanceInAutoScalingGroup"
                  ],
                  "Resource": "*",
                  "Condition": {
                    "StringEquals": {
                      "aws:ResourceTag/k8s.io/cluster-autoscaler/enabled": "true",
                      "aws:ResourceTag/k8s.io/cluster-autoscaler/${ClusterName}": "owned"
                    }
                  }
                },
                {
                  "Sid": "ReadOnlyDiscovery",
                  "Effect": "Allow",
                  "Action": [
                    "autoscaling:DescribeAutoScalingGroups",
                    "autoscaling:DescribeAutoScalingInstances",
                    "autoscaling:DescribeLaunchConfigurations",
                    "autoscaling:DescribeScalingActivities",
                    "autoscaling:DescribeTags",
                    "ec2:DescribeImages",
                    "ec2:DescribeInstanceTypes",
                    "ec2:DescribeLaunchTemplateVersions",
                    "ec2:GetInstanceTypesFromInstanceRequirements",
                    "eks:DescribeNodegroup"
                  ],
                  "Resource": "*"
                }
              ]
            }

  # ===========================================================================
  # EKS CLUSTER
  # Control plane ENIs live in the private subnets; nodes reach the API
  # privately. Public API access is a parameter (operators usually keep it on;
  # flip to PrivateOnly for locked-down environments with VPN/bastion access).
  # ===========================================================================
  Cluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      AccessConfig:
        # API access entries + the legacy aws-auth ConfigMap both work; access
        # entries are what AdminPrincipalArn uses and what AWS recommends.
        AuthenticationMode: API_AND_CONFIG_MAP
        BootstrapClusterCreatorAdminPermissions: true
      EncryptionConfig:
        - Provider:
            KeyArn: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
          Resources: [secrets]
      Logging:
        ClusterLogging:
          EnabledTypes:
            - { Type: api }
            - { Type: audit }
            - { Type: authenticator }
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
          - !Ref PrivateSubnetC
        EndpointPublicAccess: !If [PrivateOnlyEndpoint, false, true]
        EndpointPrivateAccess: true

  # Optional second cluster-admin (the stack creator already has admin via
  # BootstrapClusterCreatorAdminPermissions).
  AdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    Condition: HasAdminPrincipal
    Properties:
      ClusterName: !Ref Cluster
      PrincipalArn: !Ref AdminPrincipalArn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: !Sub "arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy"
          AccessScope: { Type: cluster }

  # --- Add-ons ---------------------------------------------------------------
  # Pod Identity agent: required for every PodIdentityAssociation (Rulebricks
  # role bindings created by the CLI, and the EBS CSI role below).
  PodIdentityAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: eks-pod-identity-agent

  # EBS CSI driver with its own scoped role via Pod Identity.
  EbsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: PodIdentityAddon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: aws-ebs-csi-driver
      PodIdentityAssociations:
        - RoleArn: !GetAtt EbsCsiRole.Arn
          ServiceAccount: ebs-csi-controller-sa

  # Resource Metrics API (metrics.k8s.io). EKS does NOT ship this by default,
  # and without it every CPU/memory-based autoscaler is inert: the chart's KEDA
  # cpu fallback triggers and the Traefik HPA all fail with
  # FailedGetResourceMetric.
  MetricsServerAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: metrics-server

  # --- Node groups -------------------------------------------------------------
  NodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref Cluster
      NodegroupName: standard-nodes
      NodeRole: !GetAtt NodeRole.Arn
      Subnets:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetC
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: AL2023_x86_64_STANDARD # m7i = Intel/x86; use AL2023_ARM_64_STANDARD for Graviton
      DiskSize: !Ref NodeVolumeSizeGiB
      ScalingConfig:
        DesiredSize: !Ref NodeDesiredCapacity
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
      Tags:
        Environment: rulebricks

  # Dedicated burst nodegroup: large on-demand nodes for the scaled-out worker
  # fleet. The taint keeps everything except workers off it; the label is what
  # the chart's soft worker affinity targets. EKS has no parked-VM (Deallocate)
  # equivalent, so bursts cold-provision (~2-3 min); a Karpenter NodePool with
  # the same label/taint is the future fast path.
  BurstNodeGroup:
    Type: AWS::EKS::Nodegroup
    Condition: BurstPoolEnabled
    Properties:
      ClusterName: !Ref Cluster
      NodegroupName: burst-workers
      NodeRole: !GetAtt NodeRole.Arn
      Subnets:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetC
      InstanceTypes:
        - !Ref BurstInstanceType
      AmiType: AL2023_x86_64_STANDARD
      DiskSize: !Ref NodeVolumeSizeGiB
      Labels:
        rulebricks.com/pool: burst
      Taints:
        - Key: rulebricks.com/pool
          Value: burst
          Effect: NO_SCHEDULE
      ScalingConfig:
        DesiredSize: 0
        MinSize: 0
        MaxSize: !Ref BurstNodeMaxSize
      Tags:
        Environment: rulebricks

  # ===========================================================================
  # OBJECT STORAGE (all Rulebricks data)
  # One bucket holds everything; decision logs and backups are key prefixes
  # (decision-logs/ and db-backups/) within it.
  # ===========================================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ClusterName}-data-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      # Production hardening (EnableDataBucketProtection): versioning gives
      # accidental-delete/overwrite recovery; the lifecycle rule caps the cost
      # of keeping noncurrent versions (Azure storage soft-delete parity).
      VersioningConfiguration:
        !If [DataBucketProtectionEnabled, { Status: Enabled }, !Ref AWS::NoValue]
      LifecycleConfiguration:
        !If
        - DataBucketProtectionEnabled
        - Rules:
            - Id: expire-noncurrent-versions
              Status: Enabled
              NoncurrentVersionExpiration: { NoncurrentDays: 30 }
        - !Ref AWS::NoValue
      Tags:
        - { Key: Environment, Value: rulebricks }

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub "${DataBucket.Arn}/*"
            Condition:
              Bool: { "aws:SecureTransport": "false" }

  # ===========================================================================
  # METRICS (Amazon Managed Service for Prometheus workspace)
  # ===========================================================================
  PrometheusWorkspace:
    Type: AWS::APS::Workspace
    Condition: ManagedPrometheusEnabled
    Properties:
      Alias: !Sub "${ClusterName}-amp"
      Tags:
        - { Key: Environment, Value: rulebricks }

  # ===========================================================================
  # RULEBRICKS ROLE (single role for all data paths). Trusts the EKS Pod
  # Identity service principal; the CLI binds it to vector/clickhouse/backup
  # (S3), prometheus (AMP), and the MSK IAM clients (hps, hps-worker,
  # topic-provision, keda-operator) via namespace-scoped Pod Identity
  # associations at deploy time. kafka-exporter is IRSA-only
  # (kafka_exporter#494) - annotate its ServiceAccount with this role if MSK
  # Kafka metrics are needed.
  # ===========================================================================
  RulebricksRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-rulebricks"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: rulebricks-s3-data
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
        - !If
          - ManagedPrometheusEnabled
          - PolicyName: rulebricks-amp-remote-write
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - aps:RemoteWrite
                  Resource:
                    - !GetAtt PrometheusWorkspace.Arn
          - !Ref AWS::NoValue
        - !If
          # With the managed MSK cluster: scope Kafka IAM permissions to that
          # cluster's topics and consumer groups (uuid wildcarded - MSK assigns
          # it at creation). Without it: keep account-scoped statements so a
          # BYO MSK cluster works without re-provisioning; harmless when Kafka
          # runs in-cluster. Tighten to a specific cluster ARN to lock down.
          - ManagedKafkaEnabled
          - PolicyName: rulebricks-msk-iam
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - kafka-cluster:Connect
                    - kafka-cluster:DescribeCluster
                    - kafka-cluster:DescribeClusterDynamicConfiguration
                  Resource:
                    - !Ref MskCluster
                - Effect: Allow
                  Action:
                    - kafka-cluster:*Topic*
                    - kafka-cluster:WriteData
                    - kafka-cluster:ReadData
                  Resource:
                    - !Sub "arn:${AWS::Partition}:kafka:${AWS::Region}:${AWS::AccountId}:topic/${ClusterName}-kafka/*"
                - Effect: Allow
                  Action:
                    - kafka-cluster:AlterGroup
                    - kafka-cluster:DescribeGroup
                  Resource:
                    - !Sub "arn:${AWS::Partition}:kafka:${AWS::Region}:${AWS::AccountId}:group/${ClusterName}-kafka/*"
          - PolicyName: rulebricks-msk-iam
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - kafka-cluster:Connect
                    - kafka-cluster:DescribeCluster
                    - kafka-cluster:DescribeClusterDynamicConfiguration
                  Resource:
                    - !Sub "arn:${AWS::Partition}:kafka:*:${AWS::AccountId}:cluster/*/*"
                - Effect: Allow
                  Action:
                    - kafka-cluster:*Topic*
                    - kafka-cluster:WriteData
                    - kafka-cluster:ReadData
                  Resource:
                    - !Sub "arn:${AWS::Partition}:kafka:*:${AWS::AccountId}:topic/*/*/*"
                - Effect: Allow
                  Action:
                    - kafka-cluster:AlterGroup
                    - kafka-cluster:DescribeGroup
                  Resource:
                    - !Sub "arn:${AWS::Partition}:kafka:*:${AWS::AccountId}:group/*/*/*"

  # ===========================================================================
  # EXTERNAL SECRETS IDENTITY - EnableExternalSecrets=true (default)
  # Read-only role the External Secrets Operator's reader ServiceAccount
  # assumes via Pod Identity (the CLI creates the association at deploy time,
  # same as the rulebricks role). Scoped to the SecretsPrefix so ESO can only
  # read Rulebricks entries, never the rest of Secrets Manager. Azure parity:
  # identity.bicep external-secrets UAMI + key-vault.bicep Secrets User role.
  # ===========================================================================
  ExternalSecretsRole:
    Type: AWS::IAM::Role
    Condition: ExternalSecretsEnabled
    Properties:
      RoleName: !Sub "${ClusterName}-external-secrets"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: read-rulebricks-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub
                    - "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Prefix}/*"
                    - Prefix: !If [DefaultSecretsPrefix, "rulebricks", !Ref SecretsPrefix]
        - !If
          - HasSecretsKmsKey
          - PolicyName: decrypt-rulebricks-secrets
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource:
                    - !Ref SecretsKmsKeyArn
          - !Ref AWS::NoValue

  # ===========================================================================
  # REGISTRY MIRROR (ECR pull-through cache) - EnableRegistryMirror=true
  # ACR-mirror parity: in-region cache of docker.io/rulebricks/* so image
  # pulls survive Docker Hub outages/rate limits and stay off the NAT path
  # (via the ECR interface endpoints when enabled). Point the chart's
  # global.imageRegistry at the RegistryMirrorUri output, e.g.
  # <account>.dkr.ecr.<region>.amazonaws.com/<cluster>-mirror/rulebricks/app.
  # ===========================================================================
  # ECR requires pull-through cache credentials to live in Secrets Manager
  # under the reserved ecr-pullthroughcache/ name prefix.
  RegistryMirrorCredentialSecret:
    Type: AWS::SecretsManager::Secret
    Condition: RegistryMirrorEnabled
    Properties:
      Name: !Sub "ecr-pullthroughcache/${ClusterName}-dockerhub"
      Description: Docker Hub credential for the Rulebricks ECR pull-through cache
      SecretString: !Sub |
        {"username":"${RegistryMirrorUsername}","accessToken":"${RegistryMirrorAccessToken}"}

  RegistryMirrorPullThroughCacheRule:
    Type: AWS::ECR::PullThroughCacheRule
    Condition: RegistryMirrorEnabled
    Properties:
      EcrRepositoryPrefix: !Sub "${ClusterName}-mirror"
      UpstreamRegistry: docker-hub
      UpstreamRegistryUrl: registry-1.docker.io
      CredentialArn: !Ref RegistryMirrorCredentialSecret

  # Auto-create cache repositories on first pull without granting nodes
  # ecr:CreateRepository.
  RegistryMirrorRepositoryTemplate:
    Type: AWS::ECR::RepositoryCreationTemplate
    Condition: RegistryMirrorEnabled
    Properties:
      Prefix: !Sub "${ClusterName}-mirror"
      AppliedFor: [PULL_THROUGH_CACHE]
      Description: Repositories auto-created by the Rulebricks pull-through cache

  # ===========================================================================
  # EXTERNAL-DNS IDENTITY - EnableExternalDns=true
  # Azure dns-role.bicep parity: a dedicated Pod Identity role scoped to one
  # Route53 hosted zone so the chart's external-dns manages records
  # automatically (single-phase install with TLS from the start).
  # ===========================================================================
  ExternalDnsRole:
    Type: AWS::IAM::Role
    Condition: ExternalDnsEnabled
    Properties:
      RoleName: !Sub "${ClusterName}-external-dns"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: manage-dns-zone
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                Resource:
                  - !Sub "arn:${AWS::Partition}:route53:::hostedzone/${DnsZoneId}"
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:ListResourceRecordSets
                  - route53:ListTagsForResource
                Resource: "*"

  # ===========================================================================
  # MANAGED KAFKA (Amazon MSK) - EnableManagedKafka=true
  # IAM auth + TLS only (no SASL/SCRAM, no plaintext). Clients connect on 9098.
  # The chart's HPS/worker/Vector pods authenticate through the
  # <cluster>-rulebricks role bound by the CLI at deploy time.
  # ===========================================================================
  KafkaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ManagedKafkaEnabled
    Properties:
      GroupDescription: MSK brokers - SASL/IAM (9098) from cluster nodes only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9098
          ToPort: 9098
          SourceSecurityGroupId: !GetAtt Cluster.ClusterSecurityGroupId
          Description: Kafka SASL/IAM from EKS nodes
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-kafka" }
        - { Key: Environment, Value: rulebricks }

  # Brokers replicate and gossip among themselves on ephemeral + broker ports.
  KafkaSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: ManagedKafkaEnabled
    Properties:
      GroupId: !Ref KafkaSecurityGroup
      IpProtocol: -1
      SourceSecurityGroupId: !Ref KafkaSecurityGroup
      Description: Broker-to-broker

  MskCluster:
    Type: AWS::MSK::Cluster
    Condition: ManagedKafkaEnabled
    Properties:
      ClusterName: !Sub "${ClusterName}-kafka"
      KafkaVersion: !Ref KafkaVersion
      NumberOfBrokerNodes: !Ref KafkaBrokerNodes
      BrokerNodeGroupInfo:
        InstanceType: !Ref KafkaInstanceType
        ClientSubnets:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
          - !Ref PrivateSubnetC
        SecurityGroups:
          - !Ref KafkaSecurityGroup
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: !Ref KafkaVolumeSizeGiB
      ClientAuthentication:
        Sasl:
          Iam: { Enabled: true }
        Unauthenticated: { Enabled: false }
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: TLS
          InCluster: true
      Tags:
        Environment: rulebricks

  # ===========================================================================
  # MANAGED REDIS (ElastiCache for Valkey) - EnableManagedRedis=true
  # Valkey matches the engine the chart runs in-cluster. TLS in transit +
  # AUTH token (generated into Secrets Manager; never appears in parameters,
  # outputs, or state). At-rest encryption on.
  # ===========================================================================
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Condition: ManagedRedisEnabled
    Properties:
      CacheSubnetGroupName: !Sub "${ClusterName}-redis"
      Description: Rulebricks Valkey subnets (private)
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetC

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ManagedRedisEnabled
    Properties:
      GroupDescription: ElastiCache Valkey - 6379 from cluster nodes only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !GetAtt Cluster.ClusterSecurityGroupId
          Description: Valkey TLS from EKS nodes
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-redis" }
        - { Key: Environment, Value: rulebricks }

  RedisAuthSecret:
    Type: AWS::SecretsManager::Secret
    Condition: ManagedRedisEnabled
    Properties:
      Name: !Sub "${ClusterName}/redis-auth"
      Description: AUTH token for the Rulebricks ElastiCache Valkey replication group
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: authToken
        PasswordLength: 32
        ExcludePunctuation: true # AUTH tokens forbid @ " / and spaces

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Condition: ManagedRedisEnabled
    Properties:
      ReplicationGroupId: !Sub "${ClusterName}-redis"
      ReplicationGroupDescription: Rulebricks cache (Valkey)
      Engine: valkey
      EngineVersion: !Ref RedisEngineVersion
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: !If [RedisMultiAzEnabled, 2, 1]
      MultiAZEnabled: !If [RedisMultiAzEnabled, true, false]
      AutomaticFailoverEnabled: !If [RedisMultiAzEnabled, true, false]
      Port: 6379
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      TransitEncryptionEnabled: true
      AtRestEncryptionEnabled: true
      AuthToken: !Sub "{{resolve:secretsmanager:${RedisAuthSecret}:SecretString:authToken}}"
      AutoMinorVersionUpgrade: true
      Tags:
        - { Key: Environment, Value: rulebricks }

  # ===========================================================================
  # MANAGED DATABASE (RDS for PostgreSQL) - EnableManagedDatabase=true
  # Supabase Realtime requires logical replication, so the parameter group
  # ships rds.logical_replication=1 (the Rulebricks CLI preflights this and
  # blocks the deploy when it is off). Master credentials are RDS-managed in
  # Secrets Manager - no password ever passes through CloudFormation.
  # ===========================================================================
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: ManagedDatabaseEnabled
    Properties:
      DBSubnetGroupName: !Sub "${ClusterName}-db"
      DBSubnetGroupDescription: Rulebricks Postgres subnets (private)
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetC

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ManagedDatabaseEnabled
    Properties:
      GroupDescription: RDS PostgreSQL - 5432 from cluster nodes only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !GetAtt Cluster.ClusterSecurityGroupId
          Description: PostgreSQL from EKS nodes
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-db" }
        - { Key: Environment, Value: rulebricks }

  DbParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Condition: ManagedDatabaseEnabled
    Properties:
      DBParameterGroupName: !Sub "${ClusterName}-pg17"
      Description: Rulebricks PostgreSQL 17 - logical replication for Supabase Realtime
      Family: postgres17
      Parameters:
        rds.logical_replication: "1" # wal_level=logical; static, applied at first boot
        max_replication_slots: "10"
        max_wal_senders: "10"

  DbInstance:
    Type: AWS::RDS::DBInstance
    Condition: ManagedDatabaseEnabled
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ClusterName}-db"
      Engine: postgres
      EngineVersion: !Ref DbEngineVersion
      DBInstanceClass: !Ref DbInstanceClass
      # No DBName: RDS PostgreSQL always creates the default "postgres"
      # database, which is what Supabase connects to (DbName output).
      MasterUsername: !Ref DbMasterUsername
      ManageMasterUserPassword: true
      AllocatedStorage: !Ref DbAllocatedStorageGiB
      MaxAllocatedStorage: !Ref DbMaxAllocatedStorageGiB
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !Ref DbMultiAz
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup
      DBParameterGroupName: !Ref DbParameterGroup
      BackupRetentionPeriod: !Ref DbBackupRetentionDays
      DeletionProtection: !Ref DbDeletionProtection
      EnablePerformanceInsights: true
      AutoMinorVersionUpgrade: true
      Tags:
        - { Key: Environment, Value: rulebricks }

Outputs:
  # --- Cluster ---------------------------------------------------------------
  ClusterName:
    Description: EKS cluster name (select it in `rulebricks init`).
    Value: !Ref Cluster
  KubeconfigCommand:
    Description: Run after stack creation to configure kubectl.
    Value: !Sub "aws eks update-kubeconfig --name ${ClusterName} --region ${AWS::Region}"
  VpcId:
    Value: !Ref Vpc
  PrivateSubnetIds:
    Description: Nodes and data services live here.
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]]
  PublicSubnetIds:
    Description: Internet-facing load balancers live here.
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]]
  ClusterSecurityGroupId:
    Description: EKS-managed security group all nodes join; data-service SGs admit it.
    Value: !GetAtt Cluster.ClusterSecurityGroupId

  # --- Storage + identity (CLI storage step) ----------------------------------
  DataBucketName:
    Description: CLI storage step - S3 bucket for decision logs and DB backups.
    Value: !Ref DataBucket
  RulebricksRoleArn:
    Description: CLI storage/metrics/kafka identity - the single Pod Identity role.
    Value: !GetAtt RulebricksRole.Arn
  ClusterAutoscalerRoleArn:
    Description: >-
      Pod Identity role for the chart-managed cluster-autoscaler; the CLI's
      workload-identity step binds the autoscaler ServiceAccount to it.
    Value: !GetAtt ClusterAutoscalerRole.Arn

  # --- Secrets (CLI secrets step) ----------------------------------------------
  ExternalSecretsRoleArn:
    Condition: ExternalSecretsEnabled
    Description: >-
      Read-only Pod Identity role for the External Secrets Operator reader
      ServiceAccount; the CLI's secrets step preselects it by name.
    Value: !GetAtt ExternalSecretsRole.Arn
  ExternalSecretsPrefix:
    Condition: ExternalSecretsEnabled
    Description: >-
      Secrets Manager name prefix the role may read. Seed one JSON object per
      Rulebricks secret under it (see the chart's .secrets.example).
    Value: !If [DefaultSecretsPrefix, "rulebricks", !Ref SecretsPrefix]

  # --- Registry mirror ---------------------------------------------------------
  RegistryMirrorUri:
    Condition: RegistryMirrorEnabled
    Description: >-
      Registry root for mirrored pulls - set the chart's global.imageRegistry
      to "<this>/" + the upstream org path, e.g.
      <uri>/rulebricks/app resolves through the pull-through cache.
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ClusterName}-mirror"

  # --- DNS (external-dns) --------------------------------------------------------
  ExternalDnsRoleArn:
    Condition: ExternalDnsEnabled
    Description: >-
      Pod Identity role for the chart's external-dns ServiceAccount, scoped to
      the DnsZoneId hosted zone.
    Value: !GetAtt ExternalDnsRole.Arn

  # --- Metrics (CLI monitoring step) ------------------------------------------
  PrometheusWorkspaceId:
    Condition: ManagedPrometheusEnabled
    Value: !Ref PrometheusWorkspace
  PrometheusRemoteWriteUrl:
    Condition: ManagedPrometheusEnabled
    Description: Set as Prometheus remote_write url (append /api/v1/remote_write).
    Value: !GetAtt PrometheusWorkspace.PrometheusEndpoint

  # --- Managed Kafka (CLI external-services step, preset aws-msk-iam) ---------
  MskClusterArn:
    Condition: ManagedKafkaEnabled
    Value: !Ref MskCluster
  MskBootstrapBrokersCommand:
    Condition: ManagedKafkaEnabled
    Description: >-
      Prints the SASL/IAM bootstrap brokers (port 9098) - paste into the CLI
      wizard's Kafka brokers field.
    Value: !Sub >-
      aws kafka get-bootstrap-brokers --cluster-arn ${MskCluster}
      --region ${AWS::Region} --query BootstrapBrokerStringSaslIam --output text
  KafkaSaslMechanism:
    Condition: ManagedKafkaEnabled
    Description: CLI wizard Kafka auth mechanism.
    Value: aws-iam
  KafkaRegion:
    Condition: ManagedKafkaEnabled
    Description: CLI wizard Kafka region field (MSK IAM signing region).
    Value: !Ref AWS::Region

  # --- Managed Redis (CLI external-services step) ------------------------------
  RedisHost:
    Condition: ManagedRedisEnabled
    Description: CLI wizard Redis host field.
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
  RedisPort:
    Condition: ManagedRedisEnabled
    Description: CLI wizard Redis port field.
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
  RedisTlsEnabled:
    Condition: ManagedRedisEnabled
    Description: CLI wizard Redis TLS toggle - transit encryption is always on.
    Value: "true"
  RedisAuthSecretArn:
    Condition: ManagedRedisEnabled
    Value: !Ref RedisAuthSecret
  RedisAuthTokenCommand:
    Condition: ManagedRedisEnabled
    Description: Prints the AUTH token - paste into the CLI wizard's Redis password field.
    Value: !Sub >-
      aws secretsmanager get-secret-value --secret-id ${RedisAuthSecret}
      --region ${AWS::Region} --query SecretString --output text
  RedisEngine:
    Condition: ManagedRedisEnabled
    Value: !Sub "valkey ${RedisEngineVersion}"

  # --- Managed database (CLI external-services step, self-hosted Supabase) -----
  DbEndpoint:
    Condition: ManagedDatabaseEnabled
    Description: CLI wizard Postgres host field.
    Value: !GetAtt DbInstance.Endpoint.Address
  DbPort:
    Condition: ManagedDatabaseEnabled
    Description: CLI wizard Postgres port field.
    Value: !GetAtt DbInstance.Endpoint.Port
  DbName:
    Condition: ManagedDatabaseEnabled
    Description: CLI wizard Postgres database field.
    Value: postgres
  DbMasterUsername:
    Condition: ManagedDatabaseEnabled
    Description: CLI wizard bootstrap master username field.
    Value: !Ref DbMasterUsername
  DbMasterSecretArn:
    Condition: ManagedDatabaseEnabled
    Description: RDS-managed Secrets Manager secret holding the master password.
    Value: !GetAtt DbInstance.MasterUserSecret.SecretArn
  DbMasterPasswordCommand:
    Condition: ManagedDatabaseEnabled
    Description: >-
      Prints the master password - paste into the CLI wizard's bootstrap master
      password field.
    Value: !Sub >-
      aws secretsmanager get-secret-value --secret-id ${DbInstance.MasterUserSecret.SecretArn}
      --region ${AWS::Region} --query SecretString --output text
